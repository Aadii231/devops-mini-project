name: CI-CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Override version tag (optional, defaults to short SHA)"
        required: false
        type: string

env:
  DOCKERHUB_NAMESPACE: adnanshakeel231
  BACKEND_IMAGE: adnanshakeel231/backend
  FRONTEND_IMAGE: adnanshakeel231/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "image_tag=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.image_tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to kind cluster on EC2 (git pull + kubectl apply over SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,REPO_URL
          script: |
            set -e
            export KUBECONFIG=/home/ubuntu/.kube/config

            if [ ! -d /home/ubuntu/devops-mini-project/.git ]; then
              rm -rf /home/ubuntu/devops-mini-project
              git clone "$REPO_URL" /home/ubuntu/devops-mini-project
            fi

            cd /home/ubuntu/devops-mini-project
            git fetch origin main
            git reset --hard origin/main

            rm -rf /home/ubuntu/k8s-rendered
            mkdir -p /home/ubuntu/k8s-rendered
            for f in k8s/*.yaml; do
              sed "s/IMAGE_TAG/${IMAGE_TAG}/g" "$f" > "/home/ubuntu/k8s-rendered/$(basename "$f")"
            done

            kubectl apply -f /home/ubuntu/k8s-rendered/00-namespace.yaml
            kubectl apply -f /home/ubuntu/k8s-rendered/10-mongodb.yaml
            kubectl apply -f /home/ubuntu/k8s-rendered/20-backend.yaml
            kubectl apply -f /home/ubuntu/k8s-rendered/30-frontend.yaml

            kubectl rollout status deployment/backend -n mern-blog --timeout=120s
            kubectl rollout status deployment/frontend -n mern-blog --timeout=120s

            kubectl get pods -n mern-blog -o wide