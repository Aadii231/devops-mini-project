version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports: 
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

  backend:
    # 🚨 This exact syntax tells Docker Compose to check the .env file first
    image: adnanshakeel231/backend:${VERSION_TAG}
    container_name: backend
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://mongodb:27017/blog
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    networks:
      - mern-network

  frontend:
    # 🚨 This exact syntax tells Docker Compose to check the .env file first
    image: adnanshakeel231/frontend:${VERSION_TAG}
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mern-network

volumes:
  mongo-data:

networks:
  mern-network:
    driver: bridge