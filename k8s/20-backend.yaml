apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: mern-blog
data:
  PORT: "5000"
  HOST: "0.0.0.0"
  MONGODB_URI: "mongodb://mongodb:27017/blog"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mern-blog
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # IMAGE_TAG is substituted by the CI/CD pipeline (see .github/workflows/ci-cd.yml)
          image: adnanshakeel231/backend:IMAGE_TAG
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mern-blog
spec:
  selector:
    app: backend
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001
