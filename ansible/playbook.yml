---
- name: Configure EC2 dev instance with Docker, Nginx, kind, kubectl
  hosts: dev
  become: true
  vars:
    kind_version: "v0.23.0"
    kubectl_version: "v1.30.0"

  tasks:
    ##########################################################
    # BASE PACKAGES (Swapped from dnf to apt for Ubuntu)
    ##########################################################
    - name: Update all packages and apt cache
      apt:
        update_cache: true
        upgrade: dist

    - name: Install base utilities
      apt:
        name:
          - git
          - curl
          - unzip
          - tar
          - jq
        state: present

    ##########################################################
    # DOCKER (Adapted package name for official Ubuntu repos)
    ##########################################################
    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    ##########################################################
    # NGINX
    ##########################################################
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Enable and start Nginx
      systemd:
        name: nginx
        enabled: true
        state: started

    - name: Deploy Nginx reverse proxy config for the MERN app
      copy:
        dest: /etc/nginx/sites-available/app.conf
        content: |
          server {
              listen 80;
              server_name _;

              # Frontend (React/Vite served by "serve" on 3000)
              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              # Backend API
              location /api/ {
                  proxy_pass http://127.0.0.1:5001/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
      notify: Reload nginx

    - name: Enable Nginx configuration site
      file:
        src: /etc/nginx/sites-available/app.conf
        dest: /etc/nginx/sites-enabled/app.conf
        state: link
      notify: Reload nginx

    - name: Remove default Nginx site configuration
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    ##########################################################
    # KUBECTL
    ##########################################################
    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    ##########################################################
    # KIND
    ##########################################################
    - name: Download kind binary
      get_url:
        url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
        dest: /usr/local/bin/kind
        mode: "0755"

    ##########################################################
    # KIND CLUSTER CONFIG + CLUSTER CREATION (Remapped paths to /home/ubuntu)
    ##########################################################
    - name: Copy kind cluster config
      copy:
        src: ../k8s/kind-config.yaml
        dest: /home/ubuntu/kind-config.yaml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Check if kind cluster already exists
      command: kind get clusters
      register: kind_clusters
      changed_when: false
      failed_when: false
      become: true
      become_user: ubuntu

    - name: Create kind cluster (devops-cluster)
      command: kind create cluster --name devops-cluster --config /home/ubuntu/kind-config.yaml
      become: true
      become_user: ubuntu
      when: "'devops-cluster' not in kind_clusters.stdout"

    - name: Ensure kubeconfig dir exists for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    ##########################################################
    # AWS CLI (for backup script -> S3)
    ##########################################################
    - name: Check if aws cli already installed
      command: which aws
      register: aws_cli_check
      changed_when: false
      failed_when: false

    - name: Download AWS CLI v2 installer
      get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
        dest: /tmp/awscliv2.zip
      when: aws_cli_check.rc != 0

    - name: Unzip AWS CLI installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: aws_cli_check.rc != 0

    - name: Install AWS CLI v2
      command: /tmp/aws/install
      when: aws_cli_check.rc != 0

    ##########################################################
    # BACKUP SCRIPTS + CRON
    ##########################################################
    - name: Ensure backups directory exists
      file:
        path: /home/ubuntu/backups
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy backup script
      copy:
        src: ../backup/backup.sh
        dest: /home/ubuntu/backup.sh
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy restore script
      copy:
        src: ../backup/restore.sh
        dest: /home/ubuntu/restore.sh
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Schedule daily backup via cron (2 AM)
      cron:
        name: "MongoDB backup to S3"
        user: ubuntu
        minute: "0"
        hour: "2"
        job: "/home/ubuntu/backup.sh >> /home/ubuntu/backups/backup.log 2>&1"

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded